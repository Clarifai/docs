      internalDetails:
        type: string
        description: Internal Annotation (do not set in production, for internal Clarifai use only).
      redirectInfo:
        $ref: '#/definitions/statusRedirectInfo'
        description: Resource location info for redirect, when resource location has been changed.
      developerNotes:
        type: string
        description: |-
          Notes for developer.
          These notes are rather technical details for developers how to interpret the status,
          e.g. why an error occurred and how to avoid getting the error.
  clarifaiapiAnnotation:
    type: object
    properties:
      id:
        type: string
