swagger: '2.0'
info:
  title: proto/clarifai/api/service.proto
  version: version not set
consumes:
  - application/json
produces:
  - application/json
tags:
  - name: V2
paths:
  /v2/annotation_filters:
    get:
      summary: List all the annotation filters.
      operationId: V2_ListAnnotationFilters2
      responses:
        '200':
          description: A successful response.
          schema:
            $ref: '#/definitions/apiMultiAnnotationFilterResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/googlerpcStatus'
      parameters:
        - name: userAppId.userId
          description: Note user_id 'me' is reserved - it is the alias for the id of authorized user
          in: query
          required: false
          type: string
        - name: userAppId.appId
          in: query
          required: false
          type: string
        - name: page
          description: |-
            (optional URL parameter) The page number. Pagination is used to split the results into chunks.
            Defaults to 1.
          in: query
          required: false
          type: integer
          format: int64
        - name: perPage
          description: |-
            (optional URL parameter) The number of results that will be contained in each page. Defaults
            to 128.
          in: query
          required: false
          type: integer
          format: int64
      tags:
        - V2
  /v2/annotation_filters/{annotationFilterId}:
    get:
      summary: Get a specific annotation filter.
      operationId: V2_GetAnnotationFilter2
      responses:
        '200':
          description: A successful response.
          schema:
            $ref: '#/definitions/apiSingleAnnotationFilterResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/googlerpcStatus'
      parameters:
        - name: annotationFilterId
          description: Identify annotation filter by id.
          in: path
          required: true
          type: string
        - name: userAppId.userId
          description: Note user_id 'me' is reserved - it is the alias for the id of authorized user
          in: query
          required: false
          type: string
        - name: userAppId.appId
          in: query
          required: false
          type: string
      tags:
        - V2
  /v2/annotations:
    get:
      summary: List all the annotation.
      operationId: V2_ListAnnotations2
      responses:
        '200':
          description: A successful response.
          schema:
            $ref: '#/definitions/apiMultiAnnotationResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/googlerpcStatus'
      parameters:
        - name: userAppId.userId
          description: Note user_id 'me' is reserved - it is the alias for the id of authorized user
          in: query
          required: false
          type: string
        - name: userAppId.appId
          in: query
          required: false
          type: string
        - name: ids
          description: List annotations for these IDs
          in: query
          required: false
          type: array
          items:
            type: string
          collectionFormat: multi
        - name: inputIds
          description: |-
            List annotations for these Input IDs
            Note that 'ids' are optional but if the are provided the number and order in
            'ids' and 'input_ids' should match
            If you do not specify 'ids' all the annotations for 'input_ids' are returned
            If a you do not specify both 'input_ids' and 'ids' all the annotations in the app are returned
          in: query
          required: false
          type: array
          items:
            type: string
          collectionFormat: multi
        - name: userIds
          description: |-
            Only return the annotations that has one of these user IDs, effectively operating as an
            OR among them to filter down the results.
            If model_version_ids or workflow_version_ids are also provided, these user_ids are OR'd with them as well because
            we want the union of all worker (user, model or workflow) annotations in the results of ListAnnotations request.
            Setting user_ids does also set list_all_annotations=True.
          in: query
          required: false
          type: array
          items:
            type: string
          collectionFormat: multi
        - name: modelVersionIds
          description: |-
            Only return the annotations that has one of these model version IDs, effectively operating as an
            OR among them to filter down the results.
            If user_ids or workflow_version_ids are also provided, these model_version_ids are OR'd with them as well because
            we want the union of all worker (user, model or workflow) annotations in the results of ListAnnotations request.
            Setting model_version_ids does also set list_all_annotations=True.
          in: query
          required: false
          type: array
          items:
            type: string
          collectionFormat: multi
        - name: workflowVersionIds
          description: |-
            Only return the annotations that has one of these workflow version IDs, effectively operating as an
            OR among them to filter down the results.
            If user_ids or model_version_ids are also provided, these workflow_version_ids are OR'd with them as well because
            we want the union of all worker (user, model or workflow) annotations in the results of ListAnnotations request.
            Setting workflow_version_ids does also set list_all_annotations=True.
          in: query
          required: false
          type: array
          items:
            type: string
          collectionFormat: multi
        - name: listAllAnnotations
          description: |-
            Set this flag to list both trusted and not trusted annotations
            by default it's listing only trusted annotations
          in: query
          required: false
          type: boolean
        - name: returnModelOutput
          description: Set this flag to return the model output for model annotations in the response.
          in: query
          required: false
          type: boolean
        - name: page
          description: |-
            (optional URL parameter) The page number. Pagination is used to split the results into chunks.
            Defaults to 1.
          in: query
          required: false
          type: integer
          format: int64
        - name: perPage
          description: |-
            (optional URL parameter) The number of results that will be contained in each page. Defaults
            to 128.
          in: query
          required: false
          type: integer
          format: int64
        - name: taskId
          description: Flag to filter annotations by task_id
          in: query
          required: false
          type: string
      tags:
        - V2
definitions:
  BookmarkOriginBookmarkType:
    type: string
    enum:
      - unknown
      - model
      - workflow
      - dataset
      - module
    default: unknown
  DeploymentSchedulingChoice:
    type: string
    enum:
      - UNKNOWN_SCHEDULING_CHOICE
      - FAIL
      - RANDOM
      - PRICE
      - PERFORMANCE
      - NETWORK
      - UTILIZATION
      - PREFER_SPOT
      - PREFER_ONDEMAND
    default: UNKNOWN_SCHEDULING_CHOICE
    description: |-
      In some scenarios it may not be obvous how we should schedule a resource to underlying nodes
      within the nodepool(s) above. The SchedulerChoice allows us to specify how to decide which
      nodepool to use when there are multiple nodepools and how to decide which type of node
      within a nodepool if there are multiple types.
      If here are multiple nondepools then a decision on which to use comes into play
      if it is not specified in the prediction request.
      Even with a single nodepool a choice may come up such as when a resource that needs scheduling
      has not specified the accelerator types it supports and the nodepool has multiple types.

       - FAIL: fail if there is any ambiguity.
       - RANDOM: randomly pick amongst the nodepools/nodes to assign.
       - PRICE: choose the compute that is cheaper
       - PERFORMANCE: schedule to the fastest known iption.
       - NETWORK: optimize based on network latency.
       - UTILIZATION: send to the least used nodepool based on it's capacity.
       - PREFER_SPOT: choose spot instances over on-demand
       - PREFER_ONDEMAND: choose on-demand instances over spot.
  MatrixUint64:
    type: object
    properties:
      nCols:
        type: string
        format: uint64
        title: Number of columns
      data:
        type: array
        items:
          type: string
          format: uint64
        description: |-
          Matrix data stored as an array.
          In order to access matrix element at row i & column j, use data[i*n_cols+j].
    description: |-
      Store matrix of uint64s values.
      It is recommended to store the matrix as a 1D array
      because it produces less bytes during serialization than a 2D array.
      The matrix does store the number of columns, but it does not store the number of rows.
      The number of rows can automatically be calculated as length(data)/n_cols.
  ModelTypeFieldModelTypeFieldType:
    type: string
    enum:
      - INVALID_MODEL_TYPE_FIELD_TYPE
      - BOOLEAN
      - STRING
      - NUMBER
      - ARRAY_OF_CONCEPTS
      - ARRAY_OF_CONCEPTS_WITH_THRESHOLD
      - RANGE
      - ENUM
      - COLLABORATORS
      - JSON
      - ARRAY_OF_NUMBERS
      - WORKFLOW_EMBED_MODELS
      - ARRAY_OF_STRINGS
      - RECURSIVE_ENUM
      - PYTHON_CODE
      - DATASET_ID
      - DATASET_VERSION_ID
      - ARRAY_OF_MODEL_CONCEPTS
      - DATASET
      - DATASET_VERSION
      - ENCRYPTED_STRING
      - CHECKPOINT_MODEL
    default: INVALID_MODEL_TYPE_FIELD_TYPE
    description: |-
      These are various types of fields that we have UIs for.

       - ARRAY_OF_CONCEPTS: For auto-completing to concepts in the app. This goes into an data.concepts field.
       - ARRAY_OF_CONCEPTS_WITH_THRESHOLD: For auto-completing to concepts in the app. This goes into an data.concepts field.
       - RANGE: A range for a float value.
       - ENUM: If ENUM is used then the "enum_options" field should also be filled in with the respective ID and description
      for the different ENUM options.
       - COLLABORATORS: For listing collaborators of the app. The field is a string of the collaborator's user_id.
       - JSON: For arbitrary json object: "{...}"
       - ARRAY_OF_NUMBERS: Such as [1.0, 2.0, 3.5]
       - WORKFLOW_EMBED_MODELS: For selecting the embed_model_version_id for context based models.
       - ARRAY_OF_STRINGS: Such as ['a', 'b', 'cantaloupe']
       - RECURSIVE_ENUM: If RECURSIVE_ENUM is used then the "enum_options" field should also be filled in with the respective ID and
      description for the different RECURSIVE_ENUM options, as well as model_type_fields for each enum choice.
       - PYTHON_CODE: For blocks of code that need to be specified by the user for setup or execution during workflow runs.
       - DATASET_ID: For selecting a dataset id in model parameters. String in API request.
       - DATASET_VERSION_ID: For selecting a dataset version id. String.
       - ARRAY_OF_MODEL_CONCEPTS: For auto-completing to concepts in the model.
       - DATASET: For selecting a dataset
       - DATASET_VERSION: For selecting a dataset version
       - ENCRYPTED_STRING: To pass a string downstream, that is encrypted in the DB and API.
       - CHECKPOINT_MODEL: For selecting a model version of the same model type to resume training from.
  ModuleVersionModuleNav:
    type: object
    properties:
      title:
        type: string
        description: |-
          This is the left side title for this module and for browser tab title of the module.
          We have this in the version so that users can change those settings
          when releasing a new version of their module.
      moduleSubNavs:
        type: array
        items:
          $ref: '#/definitions/ModuleVersionModuleSubNav'
        description: A list of subnav elements to put under the module title.
  ModuleVersionModuleSubNav:
    type: object
    properties:
      title:
        type: string
        description: |-
          This is the display title for a navbar element to link to a specific page.
          The name for this subnav element to show in the sidebar.
      queryKey:
        type: string
        title: The query param name
      queryValue:
        type: string
        title: The query param value
  NodeCapacityTypeCapacityType:
    type: string
    enum:
      - UKNOWN_CAPACITY_TYPE
      - ON_DEMAND_TYPE
      - SPOT_TYPE
    default: UKNOWN_CAPACITY_TYPE
  SearchMetric:
    type: string
    enum:
      - METRIC_NOT_SET
      - EUCLIDEAN_DISTANCE
      - COSINE_DISTANCE
    default: METRIC_NOT_SET
    description: |-
      Metric used for search. Can be EUCLIDEAN_DISTANCE (default) or COSINE_DISTANCE.
      Currently only brute force search supports non-eudlicean metrics.
  SplitIntoDatasetsDatasetSplitMethod:
    type: string
    enum:
      - NOT_SET
      - RANDOM_PERCENTAGE_SPLIT
    default: NOT_SET
    title: '- RANDOM_PERCENTAGE_SPLIT: We will randomly split inputs into the datasets'
  TaskInputSourceTaskInputSourceType:
    type: string
    enum:
      - INPUT_SOURCE_TYPE_NOT_SET
      - ALL_INPUTS
      - SAVED_SEARCH
      - DATASET
    default: INPUT_SOURCE_TYPE_NOT_SET
    description: |2-
       - ALL_INPUTS: Use all inputs in the app.
       - SAVED_SEARCH: Use the inputs from a saved search.
       - DATASET: Inputs from a dataset.
  TaskReviewTaskReviewStrategy:
    type: string
    enum:
      - TASK_REVIEW_STRATEGY_NOT_SET
      - NONE
      - MANUAL
      - CONSENSUS
    default: TASK_REVIEW_STRATEGY_NOT_SET
    description: |2-
       - NONE: No review is needed.
       - MANUAL: Manual review strategy.
       - CONSENSUS: Consensus review strategy.
  TaskTaskType:
    type: string
    enum:
      - TYPE_NOT_SET
      - CONCEPTS_CLASSIFICATION
      - BOUNDING_BOX_DETECTION
      - POLYGON_DETECTION
    default: TYPE_NOT_SET
    description: |2-
       - CONCEPTS_CLASSIFICATION: Concepts classification tasks annotate concepts for the overall image, frame of video or section of text.
       - BOUNDING_BOX_DETECTION: Bounding box detection tasks annotate rectangular bounding box regions around each concept in an image, frame of video or section of text.
       - POLYGON_DETECTION: Polygon detection tasks annotate free-form regions around concepts in an image, frame of video or section of text.
  TaskWorkerPartitionedStrategyInfoTaskWorkerPartitionedStrategy:
    type: string
    enum:
      - PARTITIONED_WORKER_STRATEGY_NOT_SET
      - EVENLY
      - WEIGHTED
    default: PARTITIONED_WORKER_STRATEGY_NOT_SET
    description: |2-
       - EVENLY: Each worker will label (approximately) the same number of inputs.
       - WEIGHTED: Each worker will have an assigned weight.
      See weights field for more details.
  TaskWorkerTaskWorkerStrategy:
    type: string
    enum:
      - WORKER_STRATEGY_NOT_SET
      - PARTITIONED
      - FULL
    default: WORKER_STRATEGY_NOT_SET
    description: |2-
       - PARTITIONED: The inputs will be partitioned in several partitions.
      Each worker will label one or more input partitions.
       - FULL: Each worker will label all inputs from input source.
  VisibilityGettable:
    type: string
    enum:
      - UNKNOWN_VISIBILITY
      - PRIVATE
      - ORG
      - PUBLIC
    default: UNKNOWN_VISIBILITY
    description: |-
      Gettable defined the level of access for GET operations for this resource.

       - UNKNOWN_VISIBILITY: Default value not allowed.
       - PRIVATE: PRIVATE requires collaborator or team permissions in order to GET this resource.
       - ORG: ORG requires you to be in the same org in order to GET this resource, but don't have to be a
      teammate or collaborator.
       - PUBLIC: PUBLIC opens up GET access to the resource to any user on the platform even if they are not
      a teammate or collaborator.
  apiAPIPostModelOutputsCollectorSource:
    type: object
    properties:
      modelUserId:
        type: string
        description: |-
          To define the model that we should collect from we need to specify the following 4 IDs:
          The User ID of the model we want to collect from.
          This is User B in the example.
      modelAppId:
        type: string
        description: The App ID of the model we want to collect from.
      modelId:
        type: string
        description: The Model ID of the model we want to collect from.
      modelVersionId:
        type: string
        description: The Version ID of the model we want to collect from.
      postInputsKeyId:
        type: string
        description: |-
          This key is used to POST /inputs into your app by the collector. It can be an API key or a
          PAT. This needs the permissions that are needed for POST /inputs for the app_id this
          Collector is defined in.
      callerUserId:
        type: string
        description: |-
          This is a private field that defaults to the app owner for public users.
          If this is left blank then this collector will collect from ALL users calling the given model.
    description: |-
      This is configuration for using the inputs send for model prediction in our API as
      as the source for data.
  apiAWSCreds:
    type: object
    properties:
      region:
        type: string
      id:
        type: string
      secret:
        type: string
      token:
        type: string
    description: AWS S3 storage credentials.
  apiAddConcepts:
    type: object
    properties:
      concepts:
        type: array
        items:
          $ref: '#/definitions/apiConcept'
  apiAddMetadata:
    type: object
    properties:
      metadata:
        type: object
        title: |-
          To handle arbitrary json metadata you can use a struct field:
          https://github.com/google/protobuf/blob/master/src/google/protobuf/struct.proto
  apiAddToDataset:
    type: object
    properties:
      datasetId:
        type: string
  apiAiAssistParameters:
    type: object
    properties:
      minThreshold:
        type: number
        format: float
        title: Min and max threshold values for approving annotations by default based on prediction score
      maxThreshold:
        type: number
        format: float
      conceptRelationIds:
        type: array
        items:
          type: string
        title: ids of concept relations. Used in AI assist workflow
    title: AiAssistParameters
  apiAnd:
    type: object
    properties:
      input:
        $ref: '#/definitions/apiInput'
        title: |-
          FILTER by input.data... information.
          This can include human provided concepts, geo location info, metadata, etc.
          This is effectively searching over only the trusted annotation attached to an input in your
          app. To search by more specific annotation fields use the Annotation object here.
          ########## Supported fields ##########
           - data.concepts[].id
           - data.concepts[].name
           - data.concepts[].value
           - data.geo.geo_box[].geo_point.latitude
           - data.geo.geo_box[].geo_point.longitude
           - data.geo.geo_limit.type
           - data.geo.geo_limit.value
           - data.geo.geo_point.latitude
           - data.geo.geo_point.longitude
           - data.image.url
           - data.metadata.fields - filter by metadata. metadata key&value fields are OR-ed.
           - dataset_ids[] - filter by dataset IDs
           - id - filter by input ID
           - status.code - filter by input status
      output:
        $ref: '#/definitions/apiOutput'
        description: |-
          RANK based predicted outputs from models such as custom trained models, pre-trained models,
          etc. This is also where you enter the image url for a visual search because what we're asking
          the system to do is find output embedding most visually similar to the provided input (that
          input being in And.output.input.data.image.url for example). This will return the Hits
          sorted by visual similarity (1.0 being very similar or exact match and 0.0 being very
          dissimlar). For a search by Output concept, this means we're asking the system to rank
          the Hits by confidence of our model's predicted Outputs. So for example if the model
          predicts an image is 0.95 likely there is a "dog" present, that should related directly
          to the score returned if you search for Output concept "dog" in your query. This provides
          a natural ranking to search results based on confidence of predictions from the models and
          is used when ANDing multiple of these types of RANK by Output queries together as well.

          ########## Supported fields ##########
           - data.clusters[].id
           - data.concepts[].id
           - data.concepts[].name
           - data.concepts[].value
           - input.data.image.base64[]
           - input.data.image.url
           - input.id
      negate:
        type: boolean
        title: |-
          If True then this will flip the meaning of this part of the
          query. This allow for queries such as dog AND ! metadata=={"blah":"value"}
      annotation:
        $ref: '#/definitions/clarifaiapiAnnotation'
        description: |-
          FILTER by annotation information. This is more flexible than just filtering by
          Input information because in the general case each input can have several annotations.
          Some example use cases for filtering by annotations:
          1) find all the inputs annotated "dog" by worker_id = "XYZ"
          2) find all the annotations associated with embed_model_version_id = "123"
          3) find all the annotations that are trusted, etc.

          Since all the annotations under the hood are joined to the embedding model's annotation
          using worker_id's of other models like cluster models or concept models should be
          combinable with queries like visual search (a query with Output filled in).

          ########## Supported fields ##########
           - annotation_info.fields - filter by annotation info
           - data.concepts[].id
           - data.concepts[].name
           - data.concepts[].value
           - data.geo.geo_box[].geo_point.latitude
           - data.geo.geo_box[].geo_point.longitude
           - data.geo.geo_limit.type
           - data.geo.geo_limit.value
           - data.geo.geo_point.latitude
           - data.geo.geo_point.longitude
           - data.image.url
           - data.metadata.fields - filter by metadata. metadata key&value fields are OR-ed.
           - input_id
           - input_level
           - model_version_id
           - status.code
           - task_id
           - trusted
           - user_id
    description: |-
      This is the common building block of a query which is a sequence of And messages ANDed together.
      Note that some fields are used too RANK results (affect the scores) and some are used to FILTER
      results (unordered subset of your app's contents). In general, FILTER operations are more
      efficient queries at scale and when combined with RANK operations can speed up search performance
      as you effectively operate on a smaller sub-set of your entire app.
  apiAnnotationFilter:
    type: object
    properties:
      id:
        type: string
        title: The ID for the annotation filter
      createdAt:
        type: string
        format: date-time
        description: |-
          When the annotation filter was created.
          The format is https://www.ietf.org/rfc/rfc3339.txt.
          Example: "2006-01-02T15:04:05.999999Z".
      modifiedAt:
        type: string
        format: date-time
        description: |-
          When the annotation filter was modified.
          The format is https://www.ietf.org/rfc/rfc3339.txt.
          Example: "2006-01-02T15:04:05.999999Z".
      userId:
        type: string
        description: The user the annotation filter belongs to.
      appId:
        type: string
        description: The app the annotation filter belongs to.
      search:
        $ref: '#/definitions/apiSearch'
        description: The search that this filter uses.
    description: |-
      AnnotationFilter is used to create a new dataset version.
      For now, the filter is simply a wrapper over a Search.
      In the future, we may add extra fields to customize the filtering.
  apiAnnotationFilterConfig:
    type: object
    properties:
      annotationFilter:
        $ref: '#/definitions/apiAnnotationFilter'
        description: The annotation filter that is used.
      ignoreEmptyInputs:
        type: boolean
        description: |-
          If true, empty inputs are not included in the dataset version.
          If false, empty inputs are included in the dataset version.
          We define an empty input as an input without any annotations after annotation filter is applied.
  apiAnnotationSearchMetrics:
    type: object
    properties:
      groundTruth:
        $ref: '#/definitions/apiSearch'
        title: The ground truth we are evaluating against
      searchToEval:
        $ref: '#/definitions/apiSearch'
        title: The set we are evaluating
      metrics:
        $ref: '#/definitions/apiEvalMetrics'
        title: The metric result
      data:
        $ref: '#/definitions/apiData'
        title: data is filled out with the concepts used for this evaluation
      activeConceptCount:
        type: integer
        format: int64
        title: active_concept_count is the number of concepts for this evaluation
      visibility:
        $ref: '#/definitions/clarifaiapiVisibility'
        description: |-
          The visibility field represents whether this message is privately/publicly visible.
          To be visible to the public the App that contains it AND the User that contains the App must
          also be publicly visible.
    title: AnnotationSearchMetrics
  apiApp:
    type: object
    properties:
      id:
        type: string
      name:
        type: string
      defaultLanguage:
        type: string
      defaultWorkflowId:
        type: string
        title: Default workflow id deprecated in favor of default_workflow
      defaultWorkflow:
        $ref: '#/definitions/apiWorkflow'
      userId:
        type: string
        title: |-
          why is user_id present here when this message type is used in PostApps but completely ignored there? PostApp already
          specifies the userid in path but doesn't even actually use neither of userids, it instead used the id from auth context.
          This creates a lot of ambiguity, should always have different message types for Post/Get endpoints so that the minimum interface for each op can be described
      createdAt:
        type: string
        format: date-time
        title: |-
          When the app was created. We follow the XXXX timestamp
          format. We use https://www.ietf.org/rfc/rfc3339.txt format:
          "2006-01-02T15:04:05.999999Z" so you can expect results like
          the following from the API:
          "2017-04-11T21:50:50.223962Z"
      modifiedAt:
        type: string
        format: date-time
        title: When the app was last modified
      legalConsentStatus:
        type: integer
        format: int64
        title: if user accept legal consent for face recognition
      metadata:
        type: object
        title: |-
          To handle arbitrary json metadata you can use a struct field:
          https://github.com/google/protobuf/blob/master/src/google/protobuf/struct.proto
      description:
        type: string
        description: short description about the app.
      sampleMs:
        type: integer
        format: int64
        title: 'Default value for model predictions on video: Sample delay for video predicting (1 frame per N milliseconds)'
      visibility:
        $ref: '#/definitions/clarifaiapiVisibility'
        description: |-
          The visibility field represents whether this message is privately/publicly visible.
          To be visible to the public the App that contains it AND the User that contains the App must
          also be publicly visible.
      dataTierId:
        type: string
        description: data tier id this app is using.
      isStarred:
        type: boolean
        title: |-
          Is starred by the requesting user (only showed on get/list requests)
          Please use PostAppStars/DeleteAppStars endpoints to star/unstar an app
      starCount:
        type: integer
        format: int32
        title: |-
          How many users have starred the app (only showed on get/list requests)
          Computed value, not editable
      notes:
        type: string
        description: |-
          Notes for the application
          This field should be used for in-depth notes and supports up to 64Kbs.
      image:
        $ref: '#/definitions/apiImage'
        title: Representative image for this app
      isTemplate:
        type: boolean
        description: |-
          An app marked as a template can be duplicated by any user that can see it,
          including all visible resources within it.
      extraInfo:
        $ref: '#/definitions/apiAppExtraInfo'
    title: Application with tasks and datasets
  apiAppCopyProgress:
    type: object
    properties:
      field:
        type: string
      value:
        type: integer
        format: int32
  apiAppDuplication:
    type: object
    properties:
      id:
        type: string
        description: The unique identifier of an app duplication job.
      destinationApp:
        $ref: '#/definitions/apiApp'
        description: |-
          The destination application where resources are written.

          If the destination does not exist, then the fields from the request are
          used to create the application. If a field is not set or not supported,
          then it will be copied from the source app, unless otherwise noted.

          Note: this field can be empty when reading app duplication jobs in cases
          where the app has been deleted or is just not visible to the caller.

          ########## Supported fields ##########
           - description
           - id      - if not set, then generated automatically
           - user_id - if not set, then the calling user is used as the app owner
      existingAppId:
        type: string
        description: |-
          The ID of an existing app you want to copy data into.

          If not provided, then we will create a new application as the destination instead.
          The various new_app_* fields can be used to set fields of this new application.

          Deprecated: Use destination_app.id with an existing ID instead.
      newAppId:
        type: string
        description: |-
          The ID to use when creating a new application.
          You cannot set this field when copying into an existing app, i.e., when existing_app_is is set.

          If not provided, then it will be generated automatically.

          Deprecated: Use destination_app.id with a new ID instead.
      newAppName:
        type: string
        description: |-
          The name to use when creating a new application.
          You cannot set this field when copying into an existing app, i.e., when existing_app_is is set.

          If not provided, then the ID of the new application is also used as the name.

          Deprecated: Application names are deprecated, use application IDs instead.
      status:
        $ref: '#/definitions/apistatusStatus'
        description: The status of the app duplication job.
      createdAt:
        type: string
        format: date-time
        description: The time when the app duplication job was created.
      lastModifiedAt:
        type: string
        format: date-time
        description: The last time when the app duplication job status was updated.
      filter:
        $ref: '#/definitions/apiAppDuplicationFilters'
        description: The filter specifies which resources are copied by the app duplication job.
      progress:
        type: array
        items:
          $ref: '#/definitions/apiAppCopyProgress'
        title: |-
          Copy progress for each resource type requested by the filter. Possible fields:
           - inputs
           - concepts
           - annotations
           - models
           - workflows
           - installed_module_versions
    title: AppDuplication
  apiAppDuplicationFilters:
    type: object
    properties:
      copyInputs:
        type: boolean
        description: |-
          Copy inputs. Requires that copy_concepts is also set.
          Note that this will still copy input-level annotations even if copy_annotations is not set.
      copyConcepts:
        type: boolean
        description: Copy concepts.
      copyAnnotations:
        type: boolean
        description: Copy annotations. Requires that copy_inputs and copy_concepts are also set.
      copyModels:
        type: boolean
        description: Copy models. Requires that copy_concepts is also set.
      copyWorkflows:
        type: boolean
        description: Copy workflows.
      copyInstalledModuleVersions:
        type: boolean
        description: Copy installed module versions.
    title: AppDuplicationFilters
  apiAppExtraInfo:
    type: object
    properties:
      searchRevisionMarker:
        type: string
        title: |-
          Revision marker for this application.
          The value of the revision changes when
          * inputs are added, updated or deleted
          * annotations are added, updated or deleted
          * inputs are added to or removed from datasets
          For example, this value can be used to detect if client side caches related to searching should be invalidated.
          Field not filled in for list endpoints, use GetApp
      counts:
        $ref: '#/definitions/apiAppResourceCounts'
  apiAppQuery:
    type: object
    properties:
      name:
        type: string
        description: Query by application name. This supports wildcard queries like "gen*" to match "general" as an example.
    title: App query
  apiAppResourceCounts:
    type: object
    properties:
      datasets:
        type: string
        format: int64
      models:
        type: string
        format: int64
      workflows:
        type: string
        format: int64
      modules:
        type: string
        format: int64
      inputs:
        type: string
        format: int64
  apiAudio:
    type: object
    properties:
      url:
        type: string
        description: |-
          This is a URL to a publicly accessible image file. The platform will download this file server
          side and then process.
      base64:
        type: string
        format: byte
        description: |-
          The base64 field is using image file bytes directly in the request.
          NOTE: if you're sending a json request, then this MUST be base64 encoded before sending (hence
          the name here).
          When using our grpc clients, you DO NOT need to base64 encode
          it yourself since the clients know how to do this for you automatically and will avoid the
          base64 encoding if they send a binary request.
      allowDuplicateUrl:
        type: boolean
        description: If True then you will be allowed to have multiple urls.
      hosted:
        $ref: '#/definitions/apiHostedURL'
        description: |-
          The hosted field lists original audio hosted in Clarifai storage. This field is currently used
          only in response.
      audioInfo:
        $ref: '#/definitions/apiAudioInfo'
        title: audio info
    title: Audio asset struct
  apiAudioInfo:
    type: object
    properties:
      audioFormat:
        type: string
        title: audio format
      sampleRate:
        type: integer
        format: int32
        title: sample rate
      durationSeconds:
        type: number
        format: float
        title: audio track duration in seconds
      bitRate:
        type: integer
        format: int32
        title: audio track bit rate
  apiAutoscaleConfig:
    type: object
    properties:
      minReplicas:
        type: integer
        format: int64
        description: |-
          The minimum number of replicas for the runner to have.
          Defaults to 0 which means autoscaling can scale down to zero.
          If you want a replica always up then set to >= 1.
      maxReplicas:
        type: integer
        format: int64
        description: The maximium number of replicas to scale up the runner to.
      trafficHistorySeconds:
        type: integer
        format: int64
        description: The number of seconds of traffic history to consider when autoscaling.
      scaleDownDelaySeconds:
        type: integer
        format: int64
        description: The time to wait before scaling down after the last request.
      scaleUpDelaySeconds:
        type: integer
        format: int64
        description: The time to wait between scaling up replicas without burst traffic.
      enablePacking:
        type: boolean
        description: |-
          Depending on your plan you may be able to enable packing of resources into a single node
          for more compute and cost efficiency.
    description: |-
      It might be better to do this as runner autoscaling so that resources
      of a model are very simply what that model needs at minimum.
      Note that resources for things like modes inside runners are not
      related to how many replicas of those runners are needed to handle traffic.
  apiAzureBlobCreds:
    type: object
    properties:
      accountName:
        type: string
      accountKey:
        type: string
    description: Azure Blob storage credentials.
  apiBinaryMetrics:
    type: object
    properties:
      numPos:
        type: integer
        format: int64
      numNeg:
        type: integer
        format: int64
      numTot:
        type: integer
        format: int64
      rocAuc:
        type: number
        format: float
      f1:
        type: number
        format: float
      concept:
        $ref: '#/definitions/apiConcept'
      rocCurve:
        $ref: '#/definitions/apiROC'
      precisionRecallCurve:
        $ref: '#/definitions/apiPrecisionRecallCurve'
      avgPrecision:
        type: number
        format: float
      areaName:
        type: string
      areaMin:
        type: number
        format: double
      areaMax:
        type: number
        format: double
      iou:
        type: number
        format: float
    title: BinaryMetrics
  apiBookmarkOrigin:
    type: object
    properties:
      id:
        type: string
        title: original resource id
      appId:
        type: string
        title: original resource app id
      userId:
        type: string
        title: original resource user id
      resourceType:
        $ref: '#/definitions/BookmarkOriginBookmarkType'
        description: resource type.
  apiBoundingBox:
    type: object
    properties:
      topRow:
        type: number
        format: float
        title: The top left of the bounding box normalized to the data dimension to be within [0-1.0]
      leftCol:
        type: number
        format: float
        title: The left column of the bounding box normalized to the data dimension to be within [0-1.0]
      bottomRow:
        type: number
        format: float
        title: The bottom row of the bounding box normalized to the data dimension to be within [0-1.0]
      rightCol:
        type: number
        format: float
        title: The right col of the bounding box normalized to the data dimension to be within [0-1.0]
    description: Rectangular bounding box for a region.
  apiBuildInfo:
    type: object
    properties:
      dockerImageName:
        type: string
        title: Docker image name
      dockerImageTag:
        type: string
        title: Docker image tag
      dockerImageDigest:
        type: string
        title: Docker image digest
  apiBulkOperation:
    type: object
    properties:
      id:
        type: string
        title: id of the Bulk Operation task
      inputIds:
        $ref: '#/definitions/apiInputIDs'
      search:
        $ref: '#/definitions/apiSearch'
      dataset:
        $ref: '#/definitions/apiDataset'
      operation:
        $ref: '#/definitions/apiOperation'
        title: Operation to perform
      appId:
        type: string
        title: Application ID that this Operation was created from
      status:
        $ref: '#/definitions/apistatusStatus'
        title: Status (pending, in-progress, completed, failed) of the operation
      progress:
        $ref: '#/definitions/apiProgress'
        title: Progress of an on-going Bulk Operation task
      createdBy:
        type: string
        title: User id that created this operation
      createdAt:
        type: string
        format: date-time
        title: |-
          When the operation was created. We follow the XXXX timestamp
          format. We use https://www.ietf.org/rfc/rfc3339.txt format:
          "2006-01-02T15:04:05.999999Z" so you can expect results like
          the following from the API:
          "2017-04-11T21:50:50.223962Z"
      lastModifiedAt:
        type: string
        format: date-time
        title: Last time the status got updated
  apiCancelBulkOperationRequest:
    type: object
    properties:
      userAppId:
        $ref: '#/definitions/apiUserAppIDSet'
      ids:
        type: array
        items:
          type: string
        title: List of bulk operation ids to be cancelled
    title: Cancel a list of bulk operation ids
  apiCancelInputsExtractionJobsRequest:
    type: object
    properties:
      userAppId:
        $ref: '#/definitions/apiUserAppIDSet'
      ids:
        type: array
        items:
          type: string
        title: List of extraction job ids to be cancelled
    title: Cancel a list of extraction job ids
  apiCloudProvider:
    type: object
    properties:
      id:
        type: string
        description: Unique identifier of the cloud provider.
      name:
        type: string
        description: Name of the cloud provider.
    description: |-
      CloudProvider represents the entity that provides the infrastructure where the Nodepools are deployed.
      This could be a public cloud provider like AWS, GCP, Azure, etc., or a self-hosted infrastructure.
  apiCluster:
    type: object
    properties:
      id:
        type: string
      count:
        type: integer
        format: int64
        title: Number of annotations tied to the cluster in the app
      score:
        type: number
        format: float
        description: |-
          The score assigned to this cluster.
          For List Clusters endpoint, this represents percentage of inputs in the app assigned to this cluster.
      hits:
        type: array
        items:
          $ref: '#/definitions/apiHit'
        title: Representative hits for cluster (for now we only return 1)
      projection:
        type: array
        items:
          type: number
          format: float
    title: Cluster data
  apiCollaboration:
    type: object
    properties:
      app:
        $ref: '#/definitions/apiApp'
        title: the application
      appOwner:
        $ref: '#/definitions/apiUser'
        title: the app owner's info(including user_unique_id, first_name, last_name, primary_email)
      scopes:
        type: array
        items:
          type: string
        title: the low-level scope users are shared with for this collaboration
      endpoints:
        type: array
        items:
          type: string
        title: the endpoint-level scopes users are shared with for this collaboration
      createdAt:
        type: string
        format: date-time
        title: when is the collaboration created
    description: collaboration includes an app you're invited to work on.
  apiCollaborator:
    type: object
    properties:
      id:
        type: string
        title: id of this collaborator
      app:
        $ref: '#/definitions/apiApp'
        description: |-
          the app this collaborator has access to
          FIXME(zeiler): this should be in the user_app_id.app_id already from the endpoint.
      user:
        $ref: '#/definitions/apiUser'
        title: who is this collaborator
      scopes:
        type: array
        items:
          type: string
        title: the permission this collaborator
      endpoints:
        type: array
        items:
          type: string
      createdAt:
        type: string
        format: date-time
        title: |-
          When the app was shared with. We follow the XXXX timestamp
          format. We use https://www.ietf.org/rfc/rfc3339.txt format:
          "2006-01-02T15:04:05.999999Z" so you can expect results like
          the following from the API:
          "2017-04-11T21:50:50.223962Z"
      modifiedAt:
        type: string
        format: date-time
        description: When the collaborator was updated.
      deletedAt:
        type: string
        format: date-time
        description: When the collaborator was removed from app.
    title: Collaborator - invited user, who shares an access to an application
  apiCollector:
    type: object
    properties:
      id:
        type: string
        description: Unique ID for the collector.
      description:
        type: string
        description: Human readable description for the collector.
      createdAt:
        type: string
        format: date-time
        title: |-
          When the collector is created. We follow the XXXX timestamp
          format. We use https://www.ietf.org/rfc/rfc3339.txt format:
          "2006-01-02T15:04:05.999999Z" so you can expect results like
          the following from the API:
          "2017-04-11T21:50:50.223962Z"
      preQueueWorkflowId:
        type: string
        description: |-
          This is a workflow to run inline in model predict calls. It should ONLY have very fast and
          light-weight models in it as it will effect the speed of the predictions being made.
          This workflow's purpose is to filter down the inputs to queue for the collector to process.
          The input to this workflow is going to be the OUTPUT of the model, not the input to the model
          since we want to encourage having fast workflows that can also take advantage of the model
          outputs to make deciions (for example: thresholding based on concepts). If the workflow
          output has any field that is non-empty then the input will be queued for the collector
          to process with the post_queue_workflow_id.

          As a simpler alternative, pre_queue_random_sample can be set to just use random sampling instead.
      preQueueRandomSample:
        type: number
        format: float
        description: |-
          Instead of needing to create a new workflow for pre_queue_workflow_id, if just random sampling
          of the model inputs is required, then pre_queue_random_sample can be set to a value from (0-1]
          to denote the fraction of inputs to collect.
      postQueueWorkflowId:
        type: string
        description: |-
          A workflow to run to after the collector is processing the queued input. This workflow
          uses the original input to the model as input to the workflow so that you can run additional
          models as well on that input to decide whether to queue the model or not. If the workflow
          output has any field that is non-empty then it will be passed on to POST /inputs to
          the destination app.
      collectorSource:
        $ref: '#/definitions/apiCollectorSource'
        description: |-
          The source of the collector to feed data into this app.
          Note(zeiler): if we wanted more than one source per collector we could make this it's own
          object and introduce /collectors/{collector_id}/sources
          We will keep it simple for now and have just one source per collector since a user can make
          more than one collector in the same app anyways.
      status:
        $ref: '#/definitions/apistatusStatus'
        description: |-
          Status for the collector. This allows you to pause a collector without having to delete it as
          an example.
      collectOutputs:
        type: boolean
        description: |-
          Whether to collect outputs or not. Default is false. If selected, outputs from the
          original model predict call will be posted as annotations along with the input with success status.
    title: |-
      Collector is a data pathway from a CollectorSource to an app to collect data automatically.
      For example, a CollectorSource
  apiCollectorSource:
    type: object
    properties:
      apiPostModelOutputsCollectorSource:
        $ref: '#/definitions/apiAPIPostModelOutputsCollectorSource'
        description: |-
          Collect from the inputs passed in for PostModelOutputs predictions of a specific model.
          This does not apply to models used within workflows, only PostModelOutputs calls.
    description: |-
      Configuration for the source to collect data from.
      Only one of the fields can be present at a time.

      The ID of the source in case we want to implment /collectors/{collector_id}/sources
       string id = 1;
  apiColor:
    type: object
    properties:
      rawHex:
        type: string
      w3c:
        $ref: '#/definitions/apiW3C'
      value:
        type: number
        format: float
    title: Color data
  apiComputeCluster:
    type: object
    properties:
      id:
        type: string
      description:
        type: string
        description: Short description of cluster region.
      cloudProvider:
        $ref: '#/definitions/apiCloudProvider'
      region:
        type: string
        description: |-
          The region. The naming here depends on the cluster choice above and will be validated
          against which clusters+regions that Clarifai currently supports.
      userId:
        type: string
        description: The user/org that this compute cluster belongs to.
      createdAt:
        type: string
        format: date-time
        description: When the compute cluster was created.
      modifiedAt:
        type: string
        format: date-time
        description: When the compute cluster was last modified.
    description: |-
      We define a cluster here to be used in Nodepools and by the cloud provider.
      There will be one cloud provider per Cluster.
      This allows us to define Clusters that are VPCs within one physical cloud and have that
      managed by one cloud provider which can list all nodepools for that VPC to deploy them and
      orchestrate work within them.
  apiComputeInfo:
    type: object
    properties:
      numCpus:
        type: integer
        format: int64
        description: Number of CPUs.
      cpuMemory:
        type: string
        description: Amount of CPU memory to use as a minimum.
      numAccelerators:
        type: integer
        format: int64
        description: Number of accelerators (typically GPUs, TPUs, etc. not CPUs) for this resource.
      acceleratorMemory:
        type: string
        description: |-
          Amount of accelerator/GPU memory to use as a minimum.
          This is defined per accelerator.
          This follows the format used by kubernetes like 1Ki, 2Mi, 3Gi, 4Ti.

          The supported accelerators that the resource can run on. If the resource requires a specific
           accelerator type then it will only be scheduled on nodes that have that type of accelerator.
           If there is no hard requirements beyond the number of accelerators and their memory then this
           field can be left empty.
           This setting will cause an error if num_accelerators == 0
      acceleratorType:
        type: array
        items:
          type: string
        description: |-
          Or should it be removed completely and use the nodepool accelerator type itself.
          These are the supported accelerators that the model can run on.
    description: |-
      These are the resource needs of a given API object such as a model.
      This is what they require as a minimum to run and will be used upon scheduling
      as the request and limit for the k8s pod. If we want to separate limits and requests in the
      future we can allow setting a limits ComputeInfo and a requests ComputeInfo.
  apiConcept:
    type: object
    properties:
      id:
        type: string
        description: The concept's unique id.
      name:
        type: string
        description: The name of the concept in the given language.
      value:
        type: number
        format: float
        description: |-
          Used to indicate presence (1.0) or not (0.0) of this concept when making a request.
          This is also the prediction probability when returning predictions from our API.
          For convenience we use the default of 1.0 when making requests so the concept you provide is
          is treated as a positive (1.0) and not a negative (which would be value == 0.0).
      createdAt:
        type: string
        format: date-time
        description: |-
          When the concept was created. The format is https://www.ietf.org/rfc/rfc3339.txt .
          Example: "2006-01-02T15:04:05.999999Z". This field is used only in a response.
      language:
        type: string
        description: |-
          The language in which the concept name is in. This is *ONLY* used in the response and setting
          it in a request is ignored since the default language of your app is used when creating
          or patching a Concept. To set other languages for your concept use the ConceptLanguage object
          and its corresponding endpoints.
      appId:
        type: string
        description: The application id that this concept is within. This can be ignored by most users.
      definition:
        type: string
        description: The definition for the concept. Similar to name. This can be ignored by most users.
      vocabId:
        type: string
        description: |-
          The vocabulary that this concept belongs to. This is useful if you have different unique sets
          of concepts that you can separate out based on this field. For example "age_appearance" vs
          "gender_appearance" in a list of concept returned from the demographics model.
      visibility:
        $ref: '#/definitions/clarifaiapiVisibility'
        description: |-
          The visibility field represents whether this message is privately/publicly visible.
          To be visible to the public the App that contains it AND the User that contains the App must
          also be publicly visible.
      userId:
        type: string
        description: The user the concept belongs to.
      keypointInfo:
        $ref: '#/definitions/apiKeypointInfo'
        title: Information about keypoints for this concept
      extraInfo:
        $ref: '#/definitions/apiConceptExtraInfo'
        description: Optional extra info.
    title: Concept or tag
  apiConceptCount:
    type: object
    properties:
      id:
        type: string
        description: The concept's unique id.
      name:
        type: string
        description: The name of the concept.
      conceptTypeCount:
        $ref: '#/definitions/apiConceptTypeCount'
        title: The total count for concepts labeled for all asset statues (processing, to_process, processed, error)
      detailConceptCount:
        $ref: '#/definitions/apiDetailConceptCount'
        title: The detail count for different assets status
    title: ConceptCount
  apiConceptExtraInfo:
    type: object
    properties:
      isRankable:
        type: boolean
        description: Whether this concept is rankable based on ConceptExtraInfoRequest configuration.
    description: |-
      ConceptExtraInfo represents extra information related to a concept that is context-dependent.
      It is only set when requested in ConceptExtraInfoRequest.
  apiConceptExtraInfoRequest:
    type: object
    properties:
      rankableModel:
        $ref: '#/definitions/apiModel'
        title: |-
          Determine if the concept is searchable by rank using this model.
          Currently, only embedder models are supported.
          ########## Supported fields ##########
          - app_id
          - id
          - model_version.id
          - user_id
  apiConceptLanguage:
    type: object
    properties:
      id:
        type: string
        description: This is the language code for the language such as "en".
      name:
        type: string
        description: The type of the outside source.
      definition:
        type: string
        description: The ID that is referenced in the source.
    description: |-
      This represents a link to an outside source for the given concept.
      The values from here are sticked into Concept message into the name and definition fields when
      returning from the API in your default language. The "id" field here becomes the "language"
      field of the Concept message which is a little weird.
  apiConceptMappingJob:
    type: object
    properties:
      knowledgeGraphId:
        type: string
        title: The id of the knowledge graph being used for this concept mapping job
      conceptIds:
        type: array
        items:
          type: string
        title: The ids of the concepts being mapped
    title: ConceptMappingJob
  apiConceptQuery:
    type: object
    properties:
      name:
        type: string
        description: The name of the concept to search.
      language:
        type: string
        description: The language of the concept name in a search. Defaults to English.
      workflowId:
        type: string
        description: 'Deprecated: Use workflow.id instead.'
      useCases:
        type: array
        items:
          $ref: '#/definitions/apiWorkflowModelUseCase'
        description: |-
          The concepts must belong to models with specified use cases.
          Multiple values are joined using an OR condition.
      model:
        $ref: '#/definitions/apiModel'
      workflow:
        $ref: '#/definitions/apiWorkflow'
    title: ConceptQuery
  apiConceptRelation:
    type: object
    properties:
      id:
        type: string
        title: ID of the concept relation
      subjectConcept:
        $ref: '#/definitions/apiConcept'
        title: The subject concept (i.e. source) of the concept relation
      objectConcept:
        $ref: '#/definitions/apiConcept'
        title: The subject concept (i.e. destination) of the concept relation
      predicate:
        type: string
        description: |-
          The predicate (i.e. edge) linking the subject and the object
          Both subject_concept and object_concept are concepts.
          The predicate is the type of relationship.
          That predicate acts on the subject.

          There are three current types of predicates:
          1) "hyponym"
          2) "hypernym"
          3) "synonym"

          1) For example, 'hyponym' is a type of predicate which represents 'is_a_kind_of' relation so
          the following relationship:
          'honey' (subject), 'hyponym' (predicate), 'food' (object)
          Can more easily be read as:
          'honey' 'is a kind of' 'food'


          2) The 'hypernym' relation is the opposite of 'hyponym' and when you add one of the
          relationships the opposite will automatically appear for you in queries.

          The 'hypernym' can be read as 'is a parent of' so:
          'food' (subject), 'hypernym' (predicate), 'honey' (object)
          Can more easily be read as:
          'food' is a parent of 'honey'

          3) The 'synonym' relation defines two concepts that essential mean the same thing. This
          is more like a "is" relationship. So for example a 'synonym' relationship could be:
          "puppy" is "pup"
          The reverse is also true once the former is added so:
          "pup" is "puppy"
          will appear in queries as well.
      knowledgeGraphId:
        type: string
        description: |-
          The knowledge graph id that this edge belongs to. If using the app's global knowledge graph
          and not a specific one then this should be the empty string "".
      visibility:
        $ref: '#/definitions/clarifaiapiVisibility'
        description: |-
          The visibility field represents whether this message is privately/publicly visible.
          To be visible to the public the App that contains it AND the User that contains the App must
          also be publicly visible.
    title: This represents a relation (i.e. edge) between the subject concept and the object concept
