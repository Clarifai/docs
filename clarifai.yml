      wildcardString:
        type: string
        description: String that can contain wild cards and the regex needs to match.
  apiModelTypeField:
    type: object
    properties:
      path:
        type: string
        description: |-
          The path where the value of the field will be stored in the model version object.
          Example:
          "output_info.data" would be the Data message in the OutputInfo message.
          "output_info.output_config.language" is in the OutputConfig message within OutputInfo
          "input_info.params" is in the params struct within InputInfo.
          "output_info.params" is in the params struct within OutputInfo.
          "train_info.params" is in the params struct within TrainInfo.
          and so on.
      fieldType:
        $ref: '#/definitions/ModelTypeFieldModelTypeFieldType'
        description: The field for this field.
      defaultValue:
        description: |-
          A default value. We use the Value field because we want to have structured data (just like
          google.protobuf.Struct but this is just a single value).
      description:
        type: string
        description: Description for this field.
      placeholder:
        type: string
        description: Placeholder text for the UI element.
      modelTypeEnumOptions:
        type: array
        items:
          $ref: '#/definitions/apiModelTypeEnumOption'
        description: List of options of the ENUM type and potentially additional fields they bring with them.
      internalOnly:
        type: boolean
        description: If this field should appear for internal users only.
      required:
        type: boolean
        description: |-
          If this field is a required field. If True then during validation you won't be able to create
          a model of this type with providing a value for this field. When False, the ModelType's
          default_value will be used for this field.
      modelTypeRangeInfo:
        $ref: '#/definitions/apiModelTypeRangeInfo'
        description: If the field_type is RANGE, this must be filled in.
    description: ModelTypeField stores a field value of a configurable type.
  apiModelTypeRangeInfo:
    type: object
    properties:
      min:
