  apiPasswordViolations:
    type: object
    properties:
      minimumLength:
        type: boolean
        title: when new password length is shorter than minimum length set
      maximumLength:
        type: boolean
        title: when new password length is longer than maximum length set
      upperCaseNeeded:
        type: boolean
        title: there is no upper case letter in the new password when there should be at least one
      lowerCaseNeeded:
        type: boolean
        title: there is no lower case letter in the new password when there should be at least one
      numericNeeded:
        type: boolean
        title: there is no numerics in the new password when there should be at least one
      nonAlphanumericNeeded:
        type: boolean
        title: there is no special character in the new password when there should be at least one
      passwordReuse:
        type: boolean
        title: when one of the N most recent old password is reused, N is specified by password_reuse_epoch in db.password_policies
      excludeNames:
        type: boolean
        title: when either user's first, middle or last name is used in the new password
      excludeEmail:
        type: boolean
        title: when first part of user's email (exact string or after removing special characters) is used in the new password
      noConfusingLetters:
        type: boolean
        title: when there are confusing letters in the new password, such as o (first character of 'omega') vs 0 (zero)
      noSimplePasswords:
        type: boolean
        title: when there are simple password patterns used, such as 12345678 or aaaaaaa1
      noCommonVocabs:
        type: boolean
        title: when there are common vocabs from the common vocab list used
      noOverlapWithOld:
        type: boolean
        title: when the current password is contained in the new password or vice versa
      passwordLifespan:
        type: boolean
        title: when password has to be changed becauase it's too old
    title: PasswordViolations
  apiPatchAction:
    type: object
    properties:
      op:
        type: string
        title: |-
          The operation to perform on the patched metadata given a path
          For now only operations 'overwrite', 'delete, and 'merge' is supported
      mergeConflictResolution:
        type: string
        description: |-
          Option 'append' will simply create a list on conflicts. For example in above example
          the final result would be
          {
            "tag": [
              {
                "id": "1",
                "data": 1
              },
              {
                "id": "2",
                "data": [2, 3]
              }
            ]
          }
        title: |-
          If the action is 'merge' and there is a conflict, how to resolve it.
          The options are
          'overwrite_by_id', 'remove_by_id', 'merge_by_id','overwrite', 'append' and 'do_nothing'
          Note that for conflict resolutions '*_by_id' to work on a list, the list should contain
          objects with an 'id' field which will be used to uniquely identify each field. For example
          Patching existing json
          {
            "tag": [
              {
                "id": "1",
                "data": 1
              },
              {
                "id": "2",
                "data": 2
              }
            ]
          }
          with op 'merge' and merge_conflict_resolution 'overwrite_by_id'
          {
            "tag": [
              {
                "id": "2",
                "data": 3
              }
            ]
          }
          would produce
          {
            "tag": [
              {
                "id": "1",
                "data": 1
              },
              {
                "id": "2",
                "data": 3
              }
            ]
          }
          while with merge_conflict_resolution 'remove_by_id' it would produce
          {
            "tag": [
              {
                "id": "1",
                "data": 1
              }
            ]
          }
      path:
        type: string
        description: |-
          Path for the change. For example 'tag[1].data' is a valid path in above example.
          Default path is root level i.e. ''.
    title: PatchAction
