        description: The user defined ID of the nodepool.
      description:
        type: string
        description: Short description about the nodepool.
      createdAt:
        type: string
        format: date-time
        description: When the nodepool was created.
      modifiedAt:
        type: string
        format: date-time
        description: When the nodepool was last modified.
      userId:
        type: string
        description: The user/org that this nodepool belongs to.
      computeCluster:
        $ref: '#/definitions/apiComputeCluster'
        description: Which cluster this nodepool is within.
      nodeCapacityType:
        $ref: '#/definitions/apiNodeCapacityType'
      instanceTypes:
        type: array
        items:
          $ref: '#/definitions/apiInstanceType'
      minInstances:
        type: integer
        format: int64
        description: |-
          Minimum number of instances in this nodepool. This allows the nodepool to scale down to this
          amount. A nodepool needs a minimum of 1 instance.
      maxInstances:
        type: integer
        format: int64
        description: |-
          An upper limit on the number of instances in this nodepool. This allows the nodepool to scale
          up to this amount.
      visibility:
        $ref: '#/definitions/clarifaiapiVisibility'
        description: |-
          The visibility field represents whether this message is privately/publicly visible.
          To be visible to the public the App that contains it AND the User that contains the App must
          also be publicly visible.
      metadata:
        type: object
        title: |-
          To handle arbitrary json metadata:
          https://github.com/google/protobuf/blob/master/src/google/protobuf/struct.proto
    description: |-
      A nodepool is a set of nodes dedicated for a given user's compute needs.
      This compute will typically be consumed by runners and in the future other objects
      like UI modules may be assigned to node pools.
