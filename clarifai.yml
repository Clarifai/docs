      appId:
        type: string
        title: The app the workflow belongs to
      createdAt:
        type: string
        format: date-time
        title: |-
          When the workflow was created. We follow the XXXX timestamp
          format. We use https://www.ietf.org/rfc/rfc3339.txt format:
          "2006-01-02T15:04:05.999999Z" so you can expect results like
          the following from the API:
          "2017-04-11T21:50:50.223962Z"
      nodes:
        type: array
        items:
          $ref: '#/definitions/apiWorkflowNode'
        description: |-
          The list of nodes retrieved from latest workflow version.
          Each node can specify an input node that it connects to in order to define the graph.
      metadata:
        type: object
        title: |-
          To handle arbitrary json metadata you can use a struct field:
          https://github.com/google/protobuf/blob/master/src/google/protobuf/struct.proto
      visibility:
        $ref: '#/definitions/clarifaiapiVisibility'
        description: |-
          The visibility field represents whether this message is privately/publicly visible.
          To be visible to the public the App that contains it AND the User that contains the App must
          also be publicly visible.
      userId:
        type: string
        title: The user the workflow belongs to
      modifiedAt:
        type: string
        format: date-time
        title: When the workflow was last modified
      version:
        $ref: '#/definitions/apiWorkflowVersion'
        description: Info about the workflow version used to return the latest version when listing Workflows.
      isStarred:
        type: boolean
        title: |-
          Is starred by the requesting user (only showed on get/list requests)
          Please use PostWorkflowStars/DeleteWorkflowStars endpoints to star/unstar a workflow
      starCount:
        type: integer
        format: int32
        title: |-
          How many users have starred the workflow (only showed on get/list requests)
          Computed value, not editable
      description:
        type: string
        title: Short description about this workflow
      notes:
        type: string
        description: |-
          Notes for the workflow
          This field should be used for in-depth notes and supports up to 64Kbs.
      useCases:
        type: array
        items:
          type: string
        title: Tags from use_cases category
      checkConsents:
        type: array
        items:
          type: string
        title: Tags for check consents
      bookmarkOrigin:
        $ref: '#/definitions/apiBookmarkOrigin'
        description: |-
          bookmark info. When set, this workflow is a bookmarked workflow of this app.
          Info in this field will allow you to find/access original workflow.
      image:
        $ref: '#/definitions/apiImage'
