          It is unique per application.
      applicationId:
        type: string
        description: Application that owns this saved search.
      name:
        type: string
        description: Human readable display name of the saved search.
      asOf:
        type: string
        format: date-time
        description: |-
          "As of" timestamp, indicating a time in the past as of which we want to
          retrieve the annotations satisfying the query.
      gitHash:
        type: string
        description: Git hash of the code that ran the filter.
      createdAt:
        type: string
        format: date-time
        description: When the saved search was created.
      modifiedAt:
        type: string
        format: date-time
        description: When the saved search was updated.
      algorithm:
        type: string
        title: |-
          The search algorithm to be used.
          Options are are 'nearest_neighbor', 'brute_force', and 'avg_concept_brute_force'
          The last two perform a brute force search visual search instead of a more scalable distributed
          nearest neighbor search and should be used by advanced users only.
          If not specified we default to nearest neighbor
      save:
        type: boolean
        title: |-
          If true, save this search, and exit without executing the search.
          If false execute the query
      minValue:
        type: number
        format: float
        description: |-
          Minimum value of confidence threshold score in result.
          Defaults to 0.0 which means we won't do any thresholding as all probabilities will
          likely be > 0.0.
      visibility:
        $ref: '#/definitions/clarifaiapiVisibility'
        description: |-
          The visibility field represents whether this message is privately/publicly visible.
          To be visible to the public the App that contains it AND the User that contains the App must
          also be publicly visible.
      metric:
        $ref: '#/definitions/SearchMetric'
    description: This is the new Search object used in saved searches.
