          An identifier for this node in the graph. This is used when connecting NodeInputs
          together.
      model:
        $ref: '#/definitions/apiModel'
        description: |-
          The model that will do the processing at this node. We only vlidate the model.id and
          model.model_version.id fields.
      nodeInputs:
        type: array
        items:
          $ref: '#/definitions/apiNodeInput'
        description: |-
          Each WorkflowNode can connect to multiple input nodes so that we can handle multi-model data
          and more complex workflow operations.
      suppressOutput:
        type: boolean
        title: suppress the output for workflow prediction
      outputInfoOverride:
        $ref: '#/definitions/apiOutputInfo'
        description: |-
          Used to override the output_info.data and output_info.params of the model specified by the node.
          Values for fields_map, message, and output_config are ignored.
    title: WorkflowNode
  apiWorkflowResult:
    type: object
    properties:
      id:
        type: string
      status:
        $ref: '#/definitions/apistatusStatus'
      createdAt:
        type: string
        format: date-time
        title: |-
          When the object was created. We follow the XXXX timestamp
          format. We use https://www.ietf.org/rfc/rfc3339.txt format:
          "2006-01-02T15:04:05.999999Z" so you can expect results like
          the following from the API:
          "2017-04-11T21:50:50.223962Z"
      model:
        $ref: '#/definitions/apiModel'
        description: |-
          The model that this WorkflowResult is for.
          DEPRECATED: not sure why there ever was a model here because each output shows the model
          that process this given input.
      input:
        $ref: '#/definitions/apiInput'
        description: The input that ran through the workflow to generate the outputs in this WorkflowResult.
      outputs:
        type: array
        items:
          $ref: '#/definitions/apiOutput'
        description: For each model in the workflow we return an Output.
      suppressOutput:
        type: boolean
        description: Indicate if the output of this model is suppressed.
    description: |-
      WorkflowResult
      One result per input in the workflow.
