      polygonsCount:
        type: string
        format: uint64
        title: Number of polygons
      pointsCount:
        type: string
        format: uint64
        title: Number of points
      masksCount:
        type: string
        format: uint64
        title: Number of masks
      regionInputsCount:
        type: string
        format: uint64
        description: |-
          Number of inputs that have regions attached
          Note that this is not a recursive count: if an input contains frames that contains regions, then the region_frames_count is increased, but region_inputs_count is not increased.
      regionFramesCount:
        type: string
        format: uint64
        title: Number of frames that have regions attached
      framesCount:
        type: string
        format: uint64
        title: Number of frames
      frameInputsCount:
        type: string
        format: uint64
        title: Number of inputs that have frames attached
      embeddingsCount:
        type: string
        format: uint64
        title: Number of embeddings
      positiveInputTagsCount:
        type: string
        format: uint64
        title: Number of positive tags added at input-level
      positiveRegionTagsCount:
        type: string
        format: uint64
        title: Number of positive tags added at region-level
      positiveFrameTagsCount:
        type: string
        format: uint64
        title: Number of positive tags added at frame-level
