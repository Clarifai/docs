      inputId:
        type: string
        title: ID of the input this annotation is tied to
      data:
        $ref: '#/definitions/apiData'
        description: The data passed along in this annotation.
      annotationInfo:
        type: object
        title: task_id is deprecated in annotation_info. Use task_id
      userId:
        type: string
